
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Collection</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}
.hero{
    background:url('https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=1200&auto=format&fit=crop') center/cover;
    height:350px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
}
.hero h1{
    background:rgba(0,0,0,0.5);
    padding:20px;
    border-radius:10px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}
.card-content{
    padding:15px;
}
.price{
    color:green;
    font-size:20px;
    font-weight:bold;
}
.btn{
    display:inline-block;
    margin-top:10px;
    background:#25D366;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
}
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>
<body>

<header>
    <h1>AK Collection</h1>
    <p>Stylish Fashion Store</p>
</header>

<section class="hero">
    <h1>Latest Fashion Collection</h1>
</section>

<section class="products">

<div class="card">
    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=800&auto=format&fit=crop">
    <div class="card-content">
        <h2>Premium Shirt</h2>
        <p class="price">₹999</p>
        <a class="btn" href="https://wa.me/919999999999?text=I%20want%20to%20order%20Premium%20Shirt">Order on WhatsApp</a>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800&auto=format&fit=crop">
    <div class="card-content">
        <h2>Trendy T-Shirt</h2>
        <p class="price">₹699</p>
        <a class="btn" href="https://wa.me/919999999999?text=I%20want%20to%20order%20Trendy%20T-Shirt">Order on WhatsApp</a>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=800&auto=format&fit=crop">
    <div class="card-content">
        <h2>Designer Wear</h2>
        <p class="price">₹1499</p>
        <a class="btn" href="https://wa.me/919999999999?text=I%20want%20to%20order%20Designer%20Wear">Order on WhatsApp</a>
    </div>
</div>

</section>

<footer>
    <p>© 2026 AK Collection | Fashion Store</p>
</footer>

</body>
</html>
